services:
  - type: web
    name: fleet-management-backend
    env: node
    buildCommand: cd backend && npm ci && npm run build
    startCommand: cd backend && npm start
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /var/data
      - key: JWT_SECRET
        generateValue: true
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        fromUser: SMTP_USER
      - key: SMTP_PASS
        fromUser: SMTP_PASS
      - key: CLIENT_URL
        value: https://Tiagovskipt595.github.io/Projeto-Teste