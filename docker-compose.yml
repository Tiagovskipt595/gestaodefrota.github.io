services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend/data:/app/data
    env_file:
      - ./backend/.env
    environment:
      - PORT=4000
      - DATA_DIR=/app/data
    networks:
      - fleet-network
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks:
      - fleet-network
    restart: always

  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - fleet-network
    depends_on:
      - backend
      - frontend
    restart: always

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --url http://proxy:80
    networks:
      - fleet-network
    restart: always
    depends_on:
      - proxy

networks:
  fleet-network:
    driver: bridge
